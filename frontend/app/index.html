<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDUTIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#FBF4E6;font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;color:#3A332A}
  button{font-family:inherit}
  @keyframes edFade{from{transform:translateY(12px)}to{transform:none}}
  @keyframes edBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes edShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}60%{transform:translateX(7px)}80%{transform:translateX(-4px)}}
  /* teclado numérico */
  .ed-key{transition:transform .1s ease,background .12s ease}
  .ed-key:hover{background:#FBEFD9}
  .ed-key:active{transform:scale(.94)}
  .ed-signout{transition:border-color .15s ease,background .15s ease}
  .ed-signout:hover{border-color:#F4A93B}
  /* Hover: reemplaza el style-hover del prototipo dc */
  .ed-role{transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .ed-role:hover{transform:translateY(-5px);box-shadow:0 16px 30px rgba(120,90,40,.2)}
  .ed-role--alumno:hover{border-color:#F4A93B}
  .ed-role--sena:hover{border-color:#6FB7D4}
  .ed-student{transition:transform .15s ease,box-shadow .15s ease,border-color .15s ease}
  .ed-student:hover{transform:translateY(-6px);box-shadow:0 16px 28px rgba(120,90,40,.18);border-color:#F4A93B}
  .ed-primary{transition:filter .15s ease}
  .ed-primary:hover{filter:brightness(1.04)}
  .ed-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:#3A332A;color:#FFFCF5;
            padding:12px 20px;border-radius:999px;font-weight:700;font-size:15px;
            box-shadow:0 8px 22px rgba(0,0,0,.2);z-index:30;animation:edFade .25s ease}
</style>
</head>
<body>
<div id="root"></div>
<!-- config.js (gitignoreado) define window.EDUTIA_CONFIG: SUPABASE_URL + anon key -->
<script src="../config.js"></script>
<!-- supabase-js vendorizado (sin CDN en runtime) → window.supabase -->
<script src="./vendor/supabase.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
